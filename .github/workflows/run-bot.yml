name: Run Divar Bot

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:          # lets you trigger it manually too

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          SEARCH_CONDITIONS: ${{ secrets.SEARCH_CONDITIONS }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHATID: ${{ secrets.BOT_CHATID }}
          SLEEP_SEC: ${{ secrets.SLEEP_SEC }}
        run: python main.py

      - name: Commit updated state file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add tokens.json || true
          git diff --staged --quiet || git commit -m "Update seen ads state"
          git push
