name: Run Divar Bot

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:          # lets you trigger it manually too

permissions:
  contents: write

concurrency:
  group: divar-bot-run
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Debug env
        run: echo "SEARCH_CONDITIONS is set:" && [ -n "$SEARCH_CONDITIONS" ] && echo "yes" || echo "NO - EMPTY"
      - name: Run bot
        env:
          SEARCH_CITY_IDS: ${{ secrets.SEARCH_CITY_IDS }}   # <-- تغییر از SEARCH_CITY_ID
          SEARCH_CATEGORY: ${{ secrets.SEARCH_CATEGORY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHATID: ${{ secrets.BOT_CHATID }}
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          BALE_CHATID: ${{ secrets.BALE_CHATID }}
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          RUBIKA_CHATID: ${{ secrets.RUBIKA_CHATID }}
          EITAA_TOKEN: ${{ secrets.EITAA_TOKEN }}
          EITAA_CHATID: ${{ secrets.EITAA_CHATID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          DEBUG_DUMP_SECTIONS: ${{ secrets.DEBUG_DUMP_SECTIONS }}
          SLEEP_SEC: ${{ secrets.SLEEP_SEC }}
        run: python main.py


      - name: Commit updated state file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -f tokens.json
          git diff --staged --quiet || git commit -m "Update seen ads state"
          git pull --rebase origin "${{ github.ref_name }}"
          git push
